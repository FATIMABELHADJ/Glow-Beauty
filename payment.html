<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment | Glow Beauty</title>

<style>
.payment-page{

min-height:100vh;
background:#fff0f7;
display:flex;
justify-content:center;
align-items:center;

}


.payment-box{

background:white;
padding:40px;
width:400px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px #ddd;

}


.pay-option{

background:#f8d7e8;
margin:15px;
padding:20px;
border-radius:20px;
cursor:pointer;
font-size:18px;

}


.pay-option:hover{

background:#e75480;
color:white;

}


.payment-box input{

width:100%;
padding:15px;
margin:10px 0;
border-radius:20px;
border:1px solid #ddd;

}


.payment-box button{

padding:12px 30px;
border:none;
border-radius:25px;
background:#8e44ad;
color:white;
cursor:pointer;

}    
</style>

</head>


<body>


<section class="payment-page">


<h1>
Choose Payment Method 💗
</h1>


<div class="payment-box">


<h2>How would you like to pay?</h2>


<div class="pay-option" onclick="choosePayment('CCP')">

💳 CCP Payment

</div>



<div class="pay-option" onclick="choosePayment('PayPal')">

🅿️ PayPal

</div>



<div class="pay-option" onclick="choosePayment('Cash')">

💵 Cash on Delivery

</div>



<div id="paymentForm"></div>


</div>


</section>



<script src="payment.js"></script>

</body>

</html>
